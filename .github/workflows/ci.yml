name: HTtech CI/CD Test Suite

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  PLAYWRIGHT_TEST: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Install QA Tests Dependencies
        run: |
          cd qa-tests
          npm install

      - name: Start App, Run E2E Tests & QA Audit
        run: |
          pnpm dev &
          npx wait-on http://localhost:3000 --timeout 90000
          pnpm exec playwright test
          cd qa-tests
          node audit_seo_a11y.js

